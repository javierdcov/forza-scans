<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Forza Scans"/>
<meta name="theme-color" content="#1B1EA8"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Forza Scans</title>
<style>
/* ═══════════════════════════════════════════════
   FORZA ACCESO — app.css
═══════════════════════════════════════════════ */
:root {
  --bg:#f5f5f0; --surface:#fff; --surface2:#f9f9f6; --surface3:#f1f0eb;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.18);
  --text:#1a1a1a; --text2:#555; --text3:#999;
  --blue:#185FA5; --blue-bg:#E6F1FB; --blue-text:#0C447C;
  --green:#1D9E75; --green-bg:#EAF3DE; --green-text:#27500A; --green-border:#639922;
  --red:#A32D2D; --red-bg:#FCEBEB; --red-text:#791F1F; --red-border:#A32D2D;
  --amber:#BA7517; --amber-bg:#FAEEDA; --amber-text:#633806; --amber-border:#EF9F27;
  --purple:#7F77DD; --purple-bg:#EEEDFE; --purple-text:#3C3489;
  --r:8px; --rl:12px;
}
@media (prefers-color-scheme:dark) {
  :root {
    --bg:#1a1a18; --surface:#242422; --surface2:#2c2c2a; --surface3:#323230;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
    --text:#f0f0ec; --text2:#aaa; --text3:#666;
    --blue-bg:#0c2a45; --blue-text:#85B7EB;
    --green-bg:#0d2a1a; --green-text:#9FE1CB; --green-border:#1D9E75;
    --red-bg:#2a0d0d; --red-text:#F09595; --red-border:#c44;
    --amber-bg:#2a1e08; --amber-text:#FAC775; --amber-border:#BA7517;
    --purple-bg:#1e1c3a; --purple-text:#AFA9EC;
  }
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased }
button, input, select, textarea { font-family:inherit; color:inherit }
button { cursor:pointer }
input, select, textarea { cursor:text; background:var(--surface); border:0.5px solid var(--border2); border-radius:var(--r); color:var(--text) }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--blue) }
a { color:var(--blue) }

/* ── SPLASH ── */
.splash { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px }
.splash-logo { width:60px; height:60px; background:var(--blue); border-radius:16px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; font-weight:700 }
.splash-name { font-size:20px; font-weight:700 }
.splash-loading { font-size:13px; color:var(--text3) }

/* ── LAYOUT ── */
.app { max-width:430px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column }

/* ── STARTUP ── */
.startup { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 22px }
.startup-brand { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:8px }
.startup-title { font-size:24px; font-weight:700; text-align:center; margin-bottom:6px }
.startup-sub { font-size:13px; color:var(--text2); text-align:center; margin-bottom:32px; line-height:1.6 }
.mode-cards { width:100%; display:flex; flex-direction:column; gap:10px }
.mode-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--rl); padding:16px; display:flex; align-items:center; gap:13px; cursor:pointer; transition:border-color .15s }
.mode-card:hover { border-color:var(--border2) }
.mode-card.sel { border:2px solid var(--blue) }
.mode-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0 }
.mode-card-title { font-size:14px; font-weight:700; margin-bottom:2px }
.mode-card-sub { font-size:12px; color:var(--text2); line-height:1.4 }
.startup-go { width:100%; padding:14px; background:var(--blue); color:#fff; border:none; border-radius:var(--rl); font-size:15px; font-weight:700; margin-top:20px }
.startup-go:disabled { opacity:.35 }

.login-form { width:100%; max-width:320px }

/* ── HEADER ── */
.hdr { background:var(--surface); border-bottom:0.5px solid var(--border); padding:11px 14px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30 }
.hdr-title { font-size:14px; font-weight:700 }
.hdr-sub { font-size:11px; color:var(--text2); margin-top:1px }
.hdr-right { display:flex; align-items:center; gap:6px }
.icon-btn { background:transparent; border:none; font-size:16px; color:var(--text2); padding:4px; line-height:1 }

/* ── BADGES ── */
.badge { font-size:10px; padding:3px 8px; border-radius:20px; font-weight:700; white-space:nowrap }
.badge-green { background:var(--green); color:#fff }
.badge-blue { background:var(--blue-bg); color:var(--blue-text) }
.badge-amber { background:var(--amber-bg); color:var(--amber-text) }
.badge-red { background:var(--red-bg); color:var(--red-text) }

/* ── ROOM BAR ── */
.room-bar { background:var(--surface); border-bottom:0.5px solid var(--border); padding:0 14px; display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch }
.room-tab { flex-shrink:0; padding:9px 11px; font-size:12px; font-weight:700; border:none; background:transparent; color:var(--text2); border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap }
.room-tab.on { color:var(--blue); border-bottom-color:var(--blue) }

/* ── TABS ── */
.tabs { display:flex; background:var(--surface); border-bottom:0.5px solid var(--border) }
.tab { flex:1; padding:9px 4px; font-size:12px; font-weight:700; border:none; background:transparent; color:var(--text2); border-bottom:2px solid transparent; transition:all .15s }
.tab.on { color:var(--blue); border-bottom-color:var(--blue) }

/* ── SHIFT STATUS STRIP (read-only, always visible) ── */
.shift-status-strip { background:var(--surface); border-bottom:0.5px solid var(--border); padding:7px 14px; display:flex; align-items:center; gap:8px; min-height:34px }
.shift-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0 }
.shift-status-dot.open { background:var(--green) }
.shift-status-dot.closed { background:var(--text3) }
.shift-status-dot.pending { background:var(--amber) }
.shift-status-label { font-size:12px; font-weight:700; flex:1 }
.shift-status-time { font-size:11px; color:var(--text2) }
.shift-status-count { font-size:11px; color:var(--text3); margin-left:auto }

/* ── SHIFT BAR (full controls, used in Turnos tab) ── */
.shift-bar-wrap { }
.shift-pills { display:flex; gap:8px }
.shift-pill { flex:1; background:var(--surface2); border:0.5px solid var(--border); border-radius:var(--r); padding:8px; text-align:center; min-width:0 }
.sp-name { font-size:11px; font-weight:700; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.sp-time { font-size:10px; color:var(--text2); margin-bottom:4px }
.sp-count { font-size:10px; color:var(--text3); margin-bottom:4px }
.shift-btn { width:100%; padding:4px 6px; border-radius:6px; font-size:11px; font-weight:700; border:none; cursor:pointer }
.shift-btn-pending { background:var(--green-bg); color:var(--green-text) }
.shift-btn-open { background:var(--red-bg); color:var(--red-text) }
.shift-btn-closed { background:var(--surface3); color:var(--text3); cursor:default }
.shift-lbl { font-size:10px; font-weight:700; padding:4px 0 }
.shift-lbl-open { color:var(--green-text) }
.shift-lbl-closed { color:var(--text3) }
.shift-lbl-pending { color:var(--amber-text) }
.shift-notice { font-size:11px; color:var(--green-text); font-weight:700; text-align:center; margin-bottom:6px }

/* ── PAGE ── */
.pg { flex:1; padding:14px; overflow-y:auto }

/* ── STATS ── */
.stats-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; margin-bottom:13px }
.stats-row-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-bottom:13px }
.stat-card { background:var(--surface2); border-radius:var(--r); padding:11px }
.stat-num { font-size:22px; font-weight:700 }
.stat-label { font-size:11px; color:var(--text2); margin-top:2px }

/* ── SCANNER ── */
.scan-box { background:#111; border-radius:var(--rl); overflow:hidden; position:relative; margin-bottom:10px }
.scan-box video { width:100%; display:block }
.scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center }
.scan-frame { width:175px; height:175px; border:2px solid rgba(255,255,255,0.5); border-radius:var(--r); position:relative }
.scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#1D9E75,transparent); animation:sml 2s linear infinite }
@keyframes sml { 0%{top:8%} 100%{top:90%} }
.scan-hint { position:absolute; bottom:9px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.6); font-size:11px }
.geo-pill { font-size:11px; color:var(--text3); text-align:center; margin-bottom:8px }

/* ── BUTTONS ── */
.btn { width:100%; padding:11px; border-radius:var(--r); font-size:14px; font-weight:700; border:none; margin-bottom:8px }
.btn-blue { background:var(--blue); color:#fff }
.btn-ghost { background:transparent; color:var(--text2); border:0.5px solid var(--border2) }
.btn-sm { padding:6px 11px; font-size:12px; border-radius:7px; border:none; font-weight:700; cursor:pointer; white-space:nowrap }
.btn-sm-blue { background:var(--blue-bg); color:var(--blue-text) }
.btn-sm-green { background:var(--green-bg); color:var(--green-text) }
.btn-sm-red { background:var(--red-bg); color:var(--red-text) }
.btn-sm-amber { background:var(--amber-bg); color:var(--amber-text) }
.btn-sm-ghost { background:transparent; border:0.5px solid var(--border2); color:var(--text2) }
.mrow { display:flex; gap:8px; margin-bottom:8px }
.minput { flex:1; padding:8px 10px; border:0.5px solid var(--border2); border-radius:var(--r); font-size:13px }
.mbtn { padding:8px 12px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer }
.form-label { display:block; font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px }

/* ── RESULT CARDS ── */
.rc { border-radius:var(--rl); padding:13px; margin-bottom:10px; animation:rci .18s ease }
@keyframes rci { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.rc.granted { background:var(--green-bg); border:1px solid var(--green-border) }
.rc.denied { background:var(--red-bg); border:1px solid var(--red-border) }
.rc.pending { background:var(--blue-bg); border:1px solid var(--blue) }
.rc.duplicate { background:var(--amber-bg); border:1px solid var(--amber-border) }
.duplicate .ri { background:var(--amber-border); color:#fff }
.duplicate .rs { color:var(--amber-text) }
.duplicate .rr { color:var(--amber-text) }
.rh { display:flex; align-items:center; gap:8px; margin-bottom:7px }
.ri { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0 }
.granted .ri { background:var(--green-border); color:#fff }
.denied .ri { background:var(--red-border); color:#fff }
.pending .ri { background:var(--blue); color:#fff }
.rs { font-size:14px; font-weight:700 }
.granted .rs { color:var(--green-text) }
.denied .rs { color:var(--red-text) }
.pending .rs { color:var(--blue-text) }
.rname { font-size:14px; font-weight:700; margin-bottom:2px }
.rcode { font-size:11px; color:var(--text2); font-family:monospace; margin-bottom:6px }
.pills { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px }
.pill { font-size:11px; padding:2px 7px; border-radius:20px; font-weight:500 }
.pill-s { background:var(--blue-bg); color:var(--blue-text) }
.pill-e { background:var(--surface3); color:var(--text2) }
.pill-c { background:var(--purple-bg); color:var(--purple-text) }
.rr { font-size:12px; font-style:italic }
.granted .rr { color:var(--green-text) }
.denied .rr { color:var(--red-text) }
.pending .rr { color:var(--blue-text) }
.decision-btns { display:flex; gap:6px; margin-top:9px }
.decision-btns button { flex:1; padding:8px 4px; font-size:11px }
.pending-info { background:rgba(0,0,0,0.05); border-radius:6px; padding:8px 10px; margin-top:8px; font-size:12px; color:var(--text2); line-height:1.5 }

/* ── LOG ── */
.lt { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em }
.li { background:var(--surface); border-radius:var(--r); border:0.5px solid var(--border); padding:8px 11px; margin-bottom:5px; display:flex; align-items:center; gap:9px }
.ld { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
.ld.granted { background:var(--green-border) }
.ld.denied { background:var(--red-border) }
.ld.pending { background:var(--blue) }
.ld.noshow { background:var(--amber) }
.ln { font-size:12px; font-weight:700 }
.lm { font-size:11px; color:var(--text2) }
.ltime { font-size:11px; color:var(--text3); margin-left:auto; flex-shrink:0; text-align:right }
.li.tappable { cursor:pointer; transition:background .12s }
.li.tappable:active { background:var(--surface2) }
.ledit { font-size:11px; color:var(--text3); flex-shrink:0 }
.lempty { text-align:center; color:var(--text3); font-size:13px; padding:24px 0 }

/* ── INFO BARS ── */
.ibar { border-radius:var(--r); padding:9px 12px; margin-bottom:10px; font-size:12px; line-height:1.5 }
.ibar-g { background:var(--green-bg); border:1px solid var(--green-border); color:var(--green-text) }
.ibar-b { background:var(--blue-bg); border:1px solid var(--blue); color:var(--blue-text) }
.ibar-r { background:var(--red-bg); border:1px solid var(--red-border); color:var(--red-text) }
.ibar-a { background:var(--amber-bg); border:1px solid var(--amber-border); color:var(--amber-text) }
.sl { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px }
.sdiv { height:0.5px; background:var(--border); margin:13px 0 }

/* ── SPORT TREE ── */
.sb { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--rl); margin-bottom:6px; overflow:hidden }
.sh { display:flex; align-items:center; padding:10px 12px; cursor:pointer; gap:7px; user-select:none }
.sh:active { background:var(--surface2) }
.sname { flex:1; font-size:13px; font-weight:700 }
.sbadge { font-size:10px; padding:2px 6px; border-radius:20px; font-weight:700 }
.bon { background:var(--green-bg); color:var(--green-text) }
.boff { background:var(--red-bg); color:var(--red-text) }
.bpart { background:var(--amber-bg); color:var(--amber-text) }
.chev { font-size:11px; color:var(--text3); transition:transform .18s; flex-shrink:0 }
.sbody { border-top:0.5px solid var(--border) }
.stblk { border-bottom:0.5px solid var(--border) }
.stblk:last-child { border-bottom:none }
.sth { display:flex; align-items:center; padding:8px 12px 8px 22px; cursor:pointer; gap:7px; user-select:none }
.sth:active { background:var(--surface2) }
.stname { flex:1; font-size:12px }
.stbody { background:var(--surface2); border-top:0.5px solid var(--border) }
.crow { display:flex; align-items:center; padding:6px 12px 6px 36px; gap:7px; border-bottom:0.5px solid var(--border) }
.crow:last-child { border-bottom:none }
.clabel { flex:1; font-size:11px }
.add-il { padding:6px 12px 6px 36px; border-top:0.5px solid var(--border); display:flex; gap:6px }
.add-il-st { padding:7px 12px 7px 22px; border-top:0.5px solid var(--border); display:flex; gap:6px }
.add-input { flex:1; padding:5px 8px; border:0.5px solid var(--border2); border-radius:6px; font-size:12px }
.add-go { padding:5px 10px; background:var(--blue); color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer }
.del-btn { font-size:10px; padding:2px 5px; border-radius:5px; border:none; background:var(--red-bg); color:var(--red-text); cursor:pointer; flex-shrink:0 }

/* ── TOGGLES ── */
.sw { position:relative; width:34px; height:19px; flex-shrink:0 }
.sw input { opacity:0; width:0; height:0 }
.sws { position:absolute; inset:0; background:#D3D1C7; border-radius:19px; cursor:pointer; transition:.18s }
.sws::before { content:''; position:absolute; width:13px; height:13px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.18s }
input:checked + .sws { background:var(--green) }
input:checked + .sws::before { transform:translateX(15px) }
.sw-sm { position:relative; width:28px; height:16px; flex-shrink:0 }
.sw-sm input { opacity:0; width:0; height:0 }
.swss { position:absolute; inset:0; background:#D3D1C7; border-radius:16px; cursor:pointer; transition:.18s }
.swss::before { content:''; position:absolute; width:10px; height:10px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.18s }
input:checked + .swss { background:var(--blue) }
input:checked + .swss::before { transform:translateX(12px) }

/* ── UPLOAD ── */
.upload-area { border:1.5px dashed var(--border2); border-radius:var(--rl); padding:16px; text-align:center; cursor:pointer; margin-bottom:10px; color:var(--text2); font-size:13px }
.upload-area:hover { border-color:var(--blue) }

/* ── SHIFT RECORDS ── */
.shift-record { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--rl); padding:12px; margin-bottom:8px }
.shift-record-header { margin-bottom:8px }
.shift-record-title { font-size:13px; font-weight:700; margin-bottom:2px }
.shift-record-meta { font-size:11px; color:var(--text2) }
.shift-stat { background:var(--surface2); border-radius:6px; padding:7px; text-align:center }
.shift-stat-num { font-size:16px; font-weight:700 }
.shift-stat-label { font-size:10px; color:var(--text2); margin-top:1px }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:flex-start; justify-content:center; padding:20px; z-index:100; overflow-y:auto }
.modal-box { background:var(--surface); border-radius:var(--rl); padding:18px; width:100%; max-width:400px; margin:auto }
.modal-title { font-size:16px; font-weight:700; margin-bottom:4px }
.modal-sub { font-size:12px; color:var(--text2); margin-bottom:14px; line-height:1.5 }

/* ── PIN GATE ── */
.pin-wrap { min-height:260px; background:rgba(0,0,0,0.28); display:flex; align-items:center; justify-content:center; border-radius:var(--rl); margin-bottom:8px }
.pin-card { background:var(--surface); border-radius:14px; padding:22px; width:240px; text-align:center }
.pin-t { font-size:15px; font-weight:700; margin-bottom:3px }
.pin-s { font-size:12px; color:var(--text2); margin-bottom:12px }
.pin-i { width:100%; padding:9px; border:0.5px solid var(--border2); border-radius:var(--r); font-size:16px; text-align:center; margin-bottom:7px }
.pin-b { width:100%; padding:10px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:700; cursor:pointer }
.pin-e { font-size:12px; color:var(--red-text); margin-bottom:7px }

/* ── ADMIN ACCOUNT / ROOM MGMT ── */
.room-mgmt-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--rl); padding:12px; margin-bottom:8px }
.room-mgmt-row { display:flex; align-items:center; gap:7px; padding:6px 0; border-bottom:0.5px solid var(--border) }
.room-mgmt-row:last-child { border-bottom:none }
.add-admin-block { background:var(--surface2); border-radius:var(--r); padding:12px; margin-bottom:10px }
.export-box { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--rl); padding:14px; margin-bottom:10px }

/* ── SHIFT CONFIG (room admin) ── */
.shift-config-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); margin-bottom:8px; overflow:hidden }
.shift-config-hdr { display:flex; align-items:center; padding:10px 12px; background:var(--surface2) }
.shift-config-times { display:flex; align-items:center; padding:8px 12px; flex-wrap:wrap; gap:4px }

</style>
</head>
<body>
<div id="root">
  <div class="splash">
    <img src="icons/icon-192.png" style="width:80px;height:80px;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,0.15)" alt="Forza" onerror="this.style.display='none'"/>
    <div class="splash-name">Forza Scans</div>
    <div class="splash-loading">Cargando…</div>

function _buildRef(db, segs) {

  for (let i = 0; i < segs.length; i++) {
    ref = (i % 2 === 0) ? ref.collection(segs[i]) : ref.doc(segs[i]);
  }
  return ref;
}

// ── QR / access logic ─────────────────────────────────────────
function parseQR(raw) {
  if (!raw) return null;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return null;
  return { code: lines[0], name: lines[1], state: lines[2] || '', sport: lines[3] || '', categories: lines.slice(4), raw };
}

function checkAccess(parsed, access) {
  if (!parsed) return { result: 'unknown', reason: 'QR no reconocido', missing: [] };
  if (parsed.sport === 'Sin Servicio') return { result: 'denied', reason: 'Sin Servicio — no autorizado', missing: [] };
  const sA = access?.[parsed.sport];
  if (!sA) return { result: 'pending', reason: `Deporte no registrado: "${parsed.sport}"`, missing: ['sport'] };
  if (!sA.enabled) return { result: 'denied', reason: `${parsed.sport} no activo en este comedor`, missing: [] };
  const stA = sA.states?.[parsed.state];
  if (!stA) return { result: 'pending', reason: `Delegación no registrada: "${parsed.state}"`, missing: ['state'] };
  if (!stA.enabled) return { result: 'denied', reason: `${parsed.state} no tiene acceso hoy`, missing: [] };
  if (parsed.categories.length > 0) {
    const unknown = parsed.categories.filter(c => stA.cats?.[c] === undefined);
    if (unknown.length) return { result: 'pending', reason: `Categoría nueva: "${unknown[0]}"`, missing: ['cat', unknown] };
    const ok = parsed.categories.some(c => stA.cats?.[c]?.enabled);
    if (!ok) return { result: 'denied', reason: 'Categoría no activa hoy', missing: [] };
  }
  return { result: 'granted', reason: `${parsed.sport} · ${parsed.state}`, missing: [] };
}

function mergeAccess(parsed, access) {
  const n = JSON.parse(JSON.stringify(access || {}));
  if (!n[parsed.sport]) n[parsed.sport] = { enabled: true, states: {} };
  else n[parsed.sport].enabled = true;
  if (!n[parsed.sport].states[parsed.state]) n[parsed.sport].states[parsed.state] = { enabled: true, cats: {} };
  else n[parsed.sport].states[parsed.state].enabled = true;
  const cats = parsed.categories.length ? parsed.categories : ['General'];
  cats.forEach(c => {
    if (!n[parsed.sport].states[parsed.state].cats[c])
      n[parsed.sport].states[parsed.state].cats[c] = { enabled: true };
    else n[parsed.sport].states[parsed.state].cats[c].enabled = true;
  });
  return n;
}

// ── Write scan to Firestore ───────────────────────────────────
async function writeScan(parsed, result, type = 'scan') {
  const room = state.rooms.find(r => r.id === state.activeRoomId);
  if (!room) return;
  const openShift = getOpenShift();
  const scanRef = doc(scansColRef(state.activeRoomId));
  await setDoc(scanRef, {
    parsed, result, type,
    shiftId:   openShift?.id || null,
    shiftName: openShift?.name || 'Sin turno',
    day:       today(),
    time:      timeNow(),
    ts:        serverTimestamp(),
    geo:       state.geo || null,
    roomId:    state.activeRoomId,
    roomName:  room.name,
  });
}

// ── Handle scan decision ──────────────────────────────────────
let pendingScan = null;
let deniedProfiles = new Set();

function profileKey(p) {
  return `${p.sport}||${p.state}||${(p.categories || []).sort().join('|')}`;
}

async function processScan(raw) {
  const parsed  = parseQR(raw);
  const room    = state.rooms.find(r => r.id === state.activeRoomId);
  const access  = room?.access || {};
  const result  = checkAccess(parsed, access);

  // Duplicate check — same credential already scanned in this shift
  if (parsed?.code) {
    const openShift = getOpenShift();
    const alreadyScanned = state.scans.find(s =>
      s.type === 'scan' &&
      s.parsed?.code === parsed.code &&
      (openShift ? s.shiftId === openShift.id : s.day === today())
    );
    if (alreadyScanned) {
      showScanResult(parsed, { result: 'duplicate', reason: `Ya registrado a las ${alreadyScanned.time}` });
      return;
    }
  }

  if (parsed && result.result === 'pending' && deniedProfiles.has(profileKey(parsed))) {
    const ar = { result: 'denied', reason: 'Perfil rechazado anteriormente' };
    await writeScan(parsed, ar);
    showScanResult(parsed, ar);
    return;
  }

  if (result.result === 'pending') {
    pendingScan = { parsed, result };
    renderPendingCard(parsed, result);
    return;
  }

  await writeScan(parsed, result);
  showScanResult(parsed, result);
}

async function decidePending(action) {
  if (!pendingScan) return;
  const { parsed } = pendingScan;
  pendingScan = null;

  if (action === 'grant') {
    const room  = state.rooms.find(r => r.id === state.activeRoomId);
    const newAcc = mergeAccess(parsed, room?.access || {});
    await updateDoc(roomDocRef(state.activeRoomId), { access: newAcc });
    const gr = { result: 'granted', reason: 'Aprobado y agregado al sistema' };
    await writeScan(parsed, gr);
    showScanResult(parsed, gr);
  } else {
    deniedProfiles.add(profileKey(parsed));
    const dr = { result: 'denied', reason: 'Denegado manualmente' };
    await writeScan(parsed, dr);
    showScanResult(parsed, dr);
  }
}

function rerender() {
  // Ensure activeRoomId is valid once rooms load
  if (state.rooms.length > 0 && !state.rooms.find(r => r.id === state.activeRoomId)) {
    const assigned = state.profile?.assignedRoom;
    state.activeRoomId = assigned && state.rooms.find(r => r.id === assigned) ? assigned : state.rooms[0].id;
    startListeners(state.activeRoomId);
  }

  const root = document.getElementById('root');
  if (!root) return;

  if (!state.authUser) { renderLogin(); return; }
  if (!state.profile)  { return; }

  // Don't rebuild the page while a scan result is on screen
  if (scanCooldown && state.view === 'scanner') return;

  // Check auto-close on every state update (catches timer gaps from background/suspend)
  // Only run when viewing today — state.shifts holds today's data only when shiftsDate is null
  if (!state.shiftsDate) autoCloseShiftIfNeeded();

  const isAdmin = state.profile.role === 'master_admin' || state.profile.role === 'admin';
  const room    = state.rooms.find(r => r.id === state.activeRoomId);

  root.innerHTML = '';
  root.appendChild(buildApp(isAdmin, room));
}

function buildApp(isAdmin, room) {
  const wrap = el('div', 'app');

  // Header
  const hdr = el('div', 'hdr');
  hdr.innerHTML = `
    <div>
      <div class="hdr-title">${state.event?.name || 'Forza Scans'}</div>
      <div class="hdr-sub">${room?.name || '—'}</div>
    </div>
    <div class="hdr-right">
      <span class="badge ${isAdmin ? 'badge-blue' : 'badge-amber'}">${isAdmin ? 'Admin' : 'Op'}</span>
      <span class="badge badge-green">${Object.values(room?.access || {}).filter(s => s.enabled).length} deportes</span>
      <button class="icon-btn" id="btn-signout" title="Cerrar sesión">⏻</button>
    </div>`;
  wrap.appendChild(hdr);

  // Room switcher (if more than one room)
  if (state.rooms.length > 1) {
    const rb = el('div', 'room-bar');
    state.rooms.forEach(r => {
      const btn = el('button', `room-tab ${r.id === state.activeRoomId ? 'on' : ''}`);
      btn.textContent = r.name;
      btn.onclick = () => switchRoom(r.id, isAdmin);
      rb.appendChild(btn);
    });
    wrap.appendChild(rb);
  }

  // Shift status strip (read-only, always visible)
  wrap.appendChild(buildShiftStatusStrip(room));

  // Tab bar (admin only)
  if (isAdmin) {
    const tabs = el('div', 'tabs');
    [['scanner','Escáner'],['shifts','Turnos'],['operators','Operadores'],['reports','Reportes'],['room-admin','Comedor'],['global-admin','Evento']].forEach(([id, label]) => {
      const btn = el('button', `tab ${state.view === id ? 'on' : ''}`);
      btn.textContent = label;
      btn.onclick = () => { state.view = id; rerender(); };
      tabs.appendChild(btn);
    });
    wrap.appendChild(tabs);
  }

  // Main content
  const pg = el('div', 'pg');
  if (state.view === 'scanner' || !isAdmin) pg.appendChild(buildScanner(room, isAdmin));
  else if (state.view === 'shifts')         pg.appendChild(buildShiftsTab(room));
 else if (state.view === 'operators') {
  const placeholder = el('div', '');
  pg.appendChild(placeholder);
  buildOperatorsTab().then(tabEl => {
    placeholder.replaceWith(tabEl);
  });
}
else if (state.view === 'reports')        pg.appendChild(buildReports(room));
  else if (state.view === 'room-admin')     pg.appendChild(buildRoomAdmin(room));
  else if (state.view === 'global-admin')   pg.appendChild(buildGlobalAdmin());
  wrap.appendChild(pg);

  // Wire signout
  setTimeout(() => {
    const so = document.getElementById('btn-signout');
    if (so) so.onclick = () => { if (confirm('¿Cerrar sesión?')) signOut(auth); };
  }, 0);

  return wrap;
}

// ── Room switcher ─────────────────────────────────────────────
async function switchRoom(roomId, isAdmin) {
  if (isAdmin) {
    state.activeRoomId = roomId;
    startListeners(roomId);
    rerender();
    return;
  }
  // Operator: require room PIN
  const pin = prompt('Ingresa el PIN de este comedor para cambiar:');
  if (!pin) return;
  const room = state.rooms.find(r => r.id === roomId);
  if (room?.pin && room.pin !== pin) { alert('PIN incorrecto.'); return; }
  state.activeRoomId = roomId;
  // Update assigned room in profile
  await updateDoc(userDocRef(state.authUser.uid), { assignedRoom: roomId });
  startListeners(roomId);
  rerender();
}

// ── Shift status strip (read-only, always visible above tabs) ────
function buildShiftStatusStrip(room) {
  const strip = el('div', 'shift-status-strip');
  if (!room) return strip;

  const open = state.shifts.find(s => s.status === 'open');
  const anyToday = state.shifts.length > 0;

  if (open) {
    const dot = el('div', 'shift-status-dot open');
    const label = el('div', 'shift-status-label');
    label.textContent = `${open.emoji} ${open.name} — Abierto`;
    const time = el('div', 'shift-status-time');
    time.textContent = `${open.start}–${open.end}`;
    const count = el('div', 'shift-status-count');
    count.textContent = `${open.scanCount || 0} scans`;
    strip.appendChild(dot);
    strip.appendChild(label);
    strip.appendChild(time);
    strip.appendChild(count);
  } else if (anyToday) {
    const allClosed = state.shifts.every(s => s.status === 'closed');
    const dot = el('div', `shift-status-dot ${allClosed ? 'closed' : 'pending'}`);
    const label = el('div', 'shift-status-label');
    label.textContent = allClosed ? 'Todos los turnos cerrados' : 'Sin turno abierto';
    label.style.color = 'var(--text2)';
    strip.appendChild(dot);
    strip.appendChild(label);
  } else {
    const dot = el('div', 'shift-status-dot pending');
    const label = el('div', 'shift-status-label');
    label.textContent = 'Sin turno abierto';
    label.style.color = 'var(--text2)';
    strip.appendChild(dot);
    strip.appendChild(label);
  }

  return strip;
}

// ── Switch shifts date (restarts listener for that day) ───────
function switchShiftsDate(dateStr) {
  // dateStr = 'YYYY-MM-DD' or null for today
  state.shiftsDate = dateStr || null;
  startListeners(state.activeRoomId); // restarts with new date
}

// ── Shifts tab (full controls, admin only) ────────────────────
function buildShiftsTab(room) {
  const wrap = el('div', '');
  if (!room) {
    const warn = el('div', 'ibar ibar-a', 'No hay comedor seleccionado.');
    wrap.appendChild(warn);
    return wrap;
  }

  const todayStr    = today();
  const selectedDay = state.shiftsDate || todayStr;
  const isToday     = selectedDay === todayStr;

  // ── Day selector ─────────────────────────────────────────────
  const dayRow = el('div', '');
  dayRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px';
  dayRow.innerHTML = `
    <button id="day-prev" style="padding:5px 10px;border:0.5px solid var(--border2);background:var(--surface);border-radius:var(--r);font-size:16px;cursor:pointer">‹</button>
    <input id="day-picker" type="date" value="${selectedDay}" max="${todayStr}"
      style="flex:1;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);text-align:center"/>
    <button id="day-next" style="padding:5px 10px;border:0.5px solid var(--border2);background:var(--surface);border-radius:var(--r);font-size:16px;cursor:pointer;opacity:${isToday?'0.3':'1'}" ${isToday?'disabled':''}>›</button>`;
  wrap.appendChild(dayRow);

  if (!isToday) {
    const pastBanner = el('div', 'ibar ibar-b');
    pastBanner.textContent = `Mostrando turnos del ${selectedDay}. Los controles están desactivados para días pasados.`;
    wrap.appendChild(pastBanner);
  }

  const title = el('div', 'sl', `TURNOS — ${room.name}${isToday ? ' — HOY' : ' — '+selectedDay}`);
  wrap.appendChild(title);

  const SHIFTS_ALL = [
    { id: 'desayuno', name: 'Desayuno', emoji: '🌅', defaultStart: '07:00', defaultEnd: '10:00' },
    { id: 'comida',   name: 'Comida',   emoji: '☀️',  defaultStart: '13:00', defaultEnd: '16:00' },
    { id: 'cena',     name: 'Cena',     emoji: '🌙',  defaultStart: '19:00', defaultEnd: '22:00' },
  ];

  const roomShiftCfg = room?.shiftConfig || {};
  const SHIFTS = SHIFTS_ALL.filter(s => {
    const cfg = roomShiftCfg[s.id];
    return cfg === undefined || cfg.enabled !== false;
  }).map(s => {
    const cfg = roomShiftCfg[s.id] || {};
    return { ...s, defaultStart: cfg.start || s.defaultStart, defaultEnd: cfg.end || s.defaultEnd };
  });

  const todayShifts = state.shifts;
  const pills = el('div', 'shift-pills');
  pills.style.marginBottom = '12px';

  SHIFTS.forEach(def => {
    const sh = todayShifts.find(s => s.shiftKey === def.id);
    const pill = el('div', 'shift-pill');
    const status = sh?.status || 'pending';

    pill.innerHTML = `
      <div class="sp-name">${def.emoji} ${def.name}</div>
      <div class="sp-time">${sh?.start || def.defaultStart}–${sh?.end || def.defaultEnd}</div>
      <div class="sp-count">${(sh?.scanCount || 0)} scans</div>`;

    if (isToday) {
      const btn = el('button', `shift-btn shift-btn-${status}`);
      btn.textContent = status === 'pending' ? 'Abrir' : status === 'open' ? 'Cerrar' : '✓';
      btn.disabled = status === 'closed';
      btn.onclick = () => status === 'pending' ? openShiftModal(def, sh, room) : closeShiftModal(sh, room);
      pill.appendChild(btn);
    } else {
      const lbl = el('div', `shift-lbl shift-lbl-${status}`);
      lbl.textContent = status === 'open' ? '● Abierto' : status === 'closed' ? '✓ Cerrado' : '— Sin datos';
      pill.appendChild(lbl);
    }

    pills.appendChild(pill);
  });

  const open = todayShifts.find(s => s.status === 'open');
  if (open && isToday) {
    const notice = el('div', 'shift-notice');
    notice.textContent = `● Turno abierto: ${open.name}`;
    wrap.appendChild(notice);
  }
  wrap.appendChild(pills);

  // Today's shift summary
  if (todayShifts.length > 0) {
    const divider = el('div', 'sdiv'); wrap.appendChild(divider);
    const sumLabel = el('div', 'sl', 'RESUMEN');
    wrap.appendChild(sumLabel);

    todayShifts.sort((a, b) => (a.shiftKey || '').localeCompare(b.shiftKey || '')).forEach(sh => {
      const shiftScans = state.scans.filter(s => s.shiftId === sh.id);
      const present = shiftScans.filter(s => s.type === 'scan' && (s.result?.result === 'granted' || s.result?.result === 'auto-added')).length;
      const card = el('div', 'shift-record');
      card.innerHTML = `
        <div class="shift-record-header">
          <div class="shift-record-title">${sh.emoji} ${sh.name}
            <span class="badge ${sh.status==='open'?'badge-green':sh.status==='closed'?'badge-blue':'badge-amber'}">
              ${sh.status==='open'?'Abierto':sh.status==='closed'?'Cerrado':'Pendiente'}
            </span>
          </div>
          <div class="shift-record-meta">${sh.start}–${sh.end}${sh.openedAt ? ' · Abierto '+sh.openedAt : ''}${sh.closedAt ? ' · Cerrado '+sh.closedAt : ''}${sh.autoClosedReason ? ' · '+sh.autoClosedReason : ''}</div>
        </div>
        <div class="stats-row-3">
          <div class="shift-stat"><div class="shift-stat-num" style="color:var(--green-text)">${present}</div><div class="shift-stat-label">Presentes</div></div>
          <div class="shift-stat"><div class="shift-stat-num">${sh.expectedCount || 0}</div><div class="shift-stat-label">Garantizado</div></div>
          <div class="shift-stat"><div class="shift-stat-num">${sh.scanCount || 0}</div><div class="shift-stat-label">Total scans</div></div>
        </div>`;
      wrap.appendChild(card);
    });
  } else if (!isToday) {
    const empty = el('div', 'lempty', 'Sin turnos registrados para este día.');
    wrap.appendChild(empty);
  }

  // Wire day selector after DOM is ready
  setTimeout(() => {
    const picker = $('day-picker');
    const prev   = $('day-prev');
    const next   = $('day-next');

    function stepDay(delta) {
      const d = new Date(selectedDay + 'T12:00:00');
      d.setDate(d.getDate() + delta);
      const newStr = d.toISOString().slice(0, 10);
      if (newStr > todayStr) return; // can't go past today
      switchShiftsDate(newStr === todayStr ? null : newStr);
    }

    if (picker) picker.onchange = () => {
      const v = picker.value;
      if (!v || v > todayStr) return;
      switchShiftsDate(v === todayStr ? null : v);
    };
    if (prev) prev.onclick = () => stepDay(-1);
    if (next) next.onclick = () => stepDay(+1);
  }, 0);

  return wrap;
}

// ── Shift modals ──────────────────────────────────────────────
function openShiftModal(def, existing, room) {
  showModal(`
    <div class="modal-title">Abrir turno — ${def.emoji} ${def.name}</div>
    <div class="modal-sub">Confirma el horario y la cantidad garantizada de comensales.</div>
    <label class="form-label">Horario</label>
    <div class="mrow">
      <input class="minput" id="sh-start" type="time" value="${existing?.start || def.defaultStart}"/>
      <span style="align-self:center;color:var(--text2);font-size:13px;flex-shrink:0">a</span>
      <input class="minput" id="sh-end" type="time" value="${existing?.end || def.defaultEnd}"/>
    </div>
    <label class="form-label">Cantidad garantizada de comensales</label>
    <input class="minput" id="sh-expected" type="number" min="0" value="${existing?.expectedCount || 0}" style="width:100%;margin-bottom:18px"/>
    <div style="display:flex;gap:8px">
      <button class="btn-sm btn-sm-ghost" data-action="cancel">Cancelar</button>
      <button class="btn-sm btn-sm-green" data-action="open-shift">Abrir turno</button>
    </div>`,
    {
      'cancel': () => closeModal(),
      'open-shift': async () => {
        const startVal    = $('sh-start')?.value || def.defaultStart;
        const endVal      = $('sh-end')?.value || def.defaultEnd;
        const expectedVal = Number($('sh-expected')?.value || 0);
        const roomId      = state.activeRoomId;
        const room2       = state.rooms.find(r => r.id === roomId);
        if (!room2) { console.error('No room found'); return; }
        closeModal();
        try {
          const newShiftRef = db
            .collection('forza_eventos').doc('current_event')
            .collection('rooms').doc(roomId)
            .collection('shifts').doc();
          await newShiftRef.set({
            shiftKey: def.id, name: def.name, emoji: def.emoji,
            start: startVal, end: endVal, expectedCount: expectedVal,
            status: 'open', openedAt: timeNow(), closedAt: null,
            scanCount: 0, day: today(), location: state.geo || null,
          });
          console.log('[SHIFT] Opened:', def.name);
        } catch(e) {
          console.error('[SHIFT] Error:', e.message);
          alert('Error al abrir turno: ' + e.message);
        }
      }
    }
  );
}

function closeShiftModal(shift, room) {
  // Build suggested no-shows from active access combos
  const acc = room?.access || {};
  const suggested = [];
  Object.entries(acc).forEach(([sport, sObj]) => {
    if (!sObj.enabled) return;
    Object.entries(sObj.states || {}).forEach(([state2, stObj]) => {
      if (!stObj.enabled) return;
      Object.entries(stObj.cats || {}).forEach(([cat, catObj]) => {
        if (!catObj.enabled) return;
        suggested.push({ sport, state: state2, cat, key: `${sport}|${state2}|${cat}` });
      });
    });
  });

  const presentScans = state.scans.filter(s => s.shiftId === shift.id && s.type === 'scan');
  const noShowCount  = (shift.expectedCount || 0) - presentScans.length;

  showModal(`
    <div class="modal-title">Cerrar turno — ${shift.emoji} ${shift.name}</div>
    <div class="modal-sub">Revisa y confirma los no-shows antes de cerrar.</div>
    <div class="stats-row-3" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-num" style="color:var(--green-text)">${presentScans.length}</div><div class="stat-label">Presentes</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber-text)" id="ns-count">0</div><div class="stat-label">No-shows</div></div>
      <div class="stat-card"><div class="stat-num" id="total-count">${presentScans.length}</div><div class="stat-label">Total garantizado</div></div>
    </div>
    <label class="form-label">Cantidad garantizada (ajustable)</label>
    <input class="minput" id="expected-adj" type="number" value="${shift.expectedCount || 0}" style="width:100%;margin-bottom:12px"/>
    ${suggested.length > 0 ? `
    <label class="form-label">Perfiles elegibles no presentes</label>
    <div style="max-height:160px;overflow-y:auto;border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px" id="suggested-list">
      ${suggested.map(s => `
        <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:0.5px solid var(--border);cursor:pointer;font-size:12px">
          <input type="checkbox" class="ns-check" data-key="${s.key}" data-sport="${s.sport}" data-state="${s.state}" data-cat="${s.cat}" onchange="updateNSCount(${presentScans.length})"/>
          <span><strong>${s.sport}</strong> · ${s.state} · ${s.cat}</span>
        </label>`).join('')}
    </div>` : ''}
    <label class="form-label">Agregar no-show manual</label>
    <div style="background:var(--surface2);border-radius:var(--radius);padding:10px;margin-bottom:12px">
      <input class="minput" id="ns-name" placeholder="Nombre" style="width:100%;margin-bottom:6px"/>
      <div class="mrow">
        <input class="minput" id="ns-sport" placeholder="Deporte"/>
        <input class="minput" id="ns-state" placeholder="Estado"/>
      </div>
      <div class="mrow">
        <input class="minput" id="ns-cat" placeholder="Categoría"/>
        <button class="mbtn" onclick="addManualNS()">+ Agregar</button>
      </div>
      <div id="manual-ns-list"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm btn-sm-ghost" data-action="cancel">Cancelar</button>
      <button class="btn-sm btn-sm-red" data-action="close-shift">Cerrar turno</button>
    </div>`,
    {
      'cancel': () => { manualNSEntries = []; closeModal(); },
      'close-shift': () => confirmCloseShift(shift.id)
    }
  );
}

let manualNSEntries = [];
window.addManualNS = () => {
  const name  = $('ns-name')?.value.trim();
  const sport = $('ns-sport')?.value.trim();
  const state2 = $('ns-state')?.value.trim();
  const cat   = $('ns-cat')?.value.trim();
  if (!name) return;
  manualNSEntries.push({ name, sport, state: state2, cat, id: Date.now() });
  if ($('ns-name')) $('ns-name').value = '';
  const list = $('manual-ns-list');
  if (list) list.innerHTML = manualNSEntries.map(e =>
    `<div style="font-size:12px;padding:5px 0;border-top:0.5px solid var(--border)">${e.name} — ${e.sport} · ${e.state}</div>`).join('');
};

window.updateNSCount = (present) => {
  const checked = document.querySelectorAll('.ns-check:checked').length + manualNSEntries.length;
  const nsEl = $('ns-count'); const totEl = $('total-count');
  if (nsEl) nsEl.textContent = checked;
  if (totEl) totEl.textContent = present + checked;
};

window.confirmCloseShift = async (shiftId) => {
  const checked = Array.from(document.querySelectorAll('.ns-check:checked')).map(c => ({
    parsed: { name: '(Perfil elegible)', code: '', state: c.dataset.state, sport: c.dataset.sport, categories: [c.dataset.cat] },
    result: { result: 'noshow' }, type: 'noshow', day: today(),
    shiftId, shiftName: '', time: '—', ts: serverTimestamp(), geo: state.geo || null,
    roomId: state.activeRoomId, roomName: '',
  }));

  const manual = manualNSEntries.map(e => ({
    parsed: { name: e.name, code: '', state: e.state, sport: e.sport, categories: e.cat ? [e.cat] : [] },
    result: { result: 'manual-noshow' }, type: 'manual-noshow', day: today(),
    shiftId, shiftName: '', time: '—', ts: serverTimestamp(), geo: state.geo || null,
    roomId: state.activeRoomId, roomName: '',
  }));

  // Write no-shows to scans collection
  await Promise.all([...checked, ...manual].map(ns => setDoc(doc(scansColRef(state.activeRoomId)), ns)));

  // Close the shift doc
  await updateDoc(shiftDocRef(state.activeRoomId, shiftId), {
    status:    'closed',
    closedAt:  timeNow(),
    expectedCount: Number($('expected-adj')?.value || 0),
    location:  state.geo || null,
  });

  manualNSEntries = [];
  closeModal();
};

// ── Modal system ──────────────────────────────────────────────
// Action registry for modal buttons — avoids eval() in module context
const modalActions = {};

function showModal(html, actions = {}) {
  // Merge actions into registry
  Object.assign(modalActions, actions);
  
  let m = $('app-modal');
  if (!m) {
    m = el('div', 'modal-overlay', '');
    m.id = 'app-modal';
    document.body.appendChild(m);
  }
  m.innerHTML = `<div class="modal-box">${html}</div>`;
  m.style.display = 'flex';

  // Wire data-action buttons
  m.querySelectorAll('button[data-action]').forEach(btn => {
    const action = btn.getAttribute('data-action');
    btn.addEventListener('click', () => {
      if (modalActions[action]) modalActions[action]();
      else console.warn('[MODAL] No action registered for:', action);
    });
  });
}

window.closeModal = () => {
  const m = $('app-modal');
  if (m) { m.style.display = 'none'; m.innerHTML = ''; }
};

// ── Log helpers ──────────────────────────────────────────────
function renderLogEntries(container, openShift, isAdmin) {
  const shiftScans = openShift ? state.scans.filter(s => s.shiftId === openShift.id) : state.scans;
  if (shiftScans.length === 0) {
    container.innerHTML = '<div class="lempty">Sin registros aún</div>';
    return;
  }
  container.innerHTML = '';
  shiftScans.slice(0, 40).forEach(sc => {
    const li = el('div', isAdmin ? 'li tappable' : 'li');
    const res = sc.result?.result || 'unknown';
    li.innerHTML = `
      <div class="ld ${res === 'auto-added' ? 'granted' : res}"></div>
      <div style="flex:1;min-width:0">
        <div class="ln">${sc.parsed?.name || 'Desconocido'}</div>
        <div class="lm">${sc.parsed?.sport || ''} · ${sc.parsed?.state || ''}</div>
      </div>
      <div class="ltime">${sc.time || ''}</div>
      ${isAdmin ? '<div class="ledit">›</div>' : ''}`;
    if (isAdmin) li.onclick = () => showScanEditModal(sc);
    container.appendChild(li);
  });
}

// Called after cooldown ends to update just the log without wiping the result card
function refreshLog() {
  const logWrap = document.getElementById('log-wrap');
  if (!logWrap) return;
  const openShift = getOpenShift();
  const isAdmin = state.profile?.role === 'master_admin' || state.profile?.role === 'admin';
  renderLogEntries(logWrap, openShift, isAdmin);
}

// ── Scan edit / delete modal ──────────────────────────────────
function showScanEditModal(sc) {
  const res      = sc.result?.result || 'unknown';
  const resLabel = { granted: 'Permitido', denied: 'Denegado', 'auto-added': 'Aprobado', pending: 'Pendiente', duplicate: 'Duplicado', noshow: 'No-show' };
  const resColor = { granted: 'var(--green-text)', denied: 'var(--red-text)', 'auto-added': 'var(--green-text)', pending: 'var(--blue-text)', duplicate: 'var(--amber-text)' };

  const doEdit = async (newResult) => {
    closeModal();
    try {

let videoStream = null;
let rafId = null;
let lastResultEl = null;

function buildScanner(room, isAdmin) {
  const wrap = el('div', '');
  const openShift = getOpenShift();

  if (!openShift) {
    const warn = el('div', 'ibar ibar-a');
    warn.textContent = isAdmin ? 'No hay turno abierto. Abre un turno para comenzar.' : 'Esperando apertura del turno…';
    wrap.appendChild(warn);
    if (!isAdmin) wrap._scanBlocked = true;
  }

  if (state.geo?.lat) {
    const geoEl = el('div', 'geo-pill');
    geoEl.textContent = `📍 ${state.geo.lat}, ${state.geo.lng} ±${state.geo.acc}m`;
    wrap.appendChild(geoEl);
  }

  // Stats
  const todayScans = state.scans.filter(s => s.type === 'scan');
  const stats = el('div', 'stats-row');
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--green-text)">${todayScans.filter(s=>s.result?.result==='granted'||s.result?.result==='auto-added').length}</div><div class="stat-label">Presentes hoy</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red-text)">${todayScans.filter(s=>s.result?.result==='denied').length}</div><div class="stat-label">Denegados</div></div>`;
  wrap.appendChild(stats);

  // Camera box
  const camBox = el('div', 'scan-box');

  camBox.style.justifyContent = 'center';
  camBox.innerHTML = '<span style="color:rgba(255,255,255,0.3);font-size:13px">Cámara inactiva</span>';
  wrap.appendChild(camBox);

  const vid = document.createElement('video');
  vid.id = 'qr-video'; vid.playsInline = true; vid.muted = true;
  vid.style.cssText = 'width:100%;display:none';
  const cvs = document.createElement('canvas');
  cvs.id = 'qr-canvas'; cvs.style.display = 'none';
  wrap.appendChild(vid); wrap.appendChild(cvs);

  // Start / stop button
  const startBtn = el('button', 'btn btn-blue', 'Iniciar escáner');
  startBtn.id = 'scan-toggle';
  wrap.appendChild(startBtn);

  // Manual input
  const manRow = el('div', 'mrow');
  manRow.innerHTML = '<input class="minput" id="man-input" placeholder="Código manual…"/><button class="mbtn" id="man-btn">Verificar</button>';
  wrap.appendChild(manRow);

  // Result area
  const resultArea = el('div', '');
  resultArea.id = 'result-area';
  wrap.appendChild(resultArea);

  // Log
  const logTitle = el('div', 'lt');
  logTitle.textContent = openShift ? `Turno actual — ${openShift.name}` : 'Registro de hoy';
  wrap.appendChild(logTitle);

  const logWrap = el('div', '');
  logWrap.id = 'log-wrap';
  renderLogEntries(logWrap, openShift, isAdmin);
  wrap.appendChild(logWrap);

  // Wire events after render
  setTimeout(() => {
    const toggle = $('scan-toggle');
    const manBtn = $('man-btn');
    const manIn  = $('man-input');

    // Block operators when no shift is open
    if (wrap._scanBlocked) {
      if (toggle) { toggle.disabled = true; toggle.style.opacity = '0.4'; }
      if (manBtn) { manBtn.disabled = true; manBtn.style.opacity = '0.4'; }
      if (manIn)  { manIn.disabled = true; manIn.style.opacity = '0.4'; }
      return;
    }

    // Create a persistent canvas that lives outside the camera box
    // so it never gets destroyed when we rebuild the box innerHTML
    const persistCanvas = document.createElement('canvas');
    persistCanvas.style.display = 'none';
    document.body.appendChild(persistCanvas);

    if (toggle) toggle.onclick = async () => {
      // Use dataset.scanning so handleScan can reset it from outside this closure
      const scanning = toggle.dataset.scanning === 'true';
      if (!scanning) {
        try {
          const constraints = {
            video: {
              facingMode: { ideal: 'environment' },
              width:  { ideal: 640 },
              height: { ideal: 480 },
            }
          };
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          videoStream = stream;

          // Build camera UI inside the box
          const box = $('cam-box');
          if (box) {
            box.style.cssText = 'background:#111;border-radius:12px;overflow:hidden;position:relative;margin-bottom:10px';
            box.innerHTML = '';
            const vid = document.createElement('video');
            vid.id = 'qr-video-live';
            vid.playsInline = true;
            vid.muted = true;
            vid.setAttribute('playsinline', '');
            vid.setAttribute('webkit-playsinline', '');
            vid.style.cssText = 'width:100%;display:block';
            vid.srcObject = stream;
            box.appendChild(vid);
            // Enable continuous autofocus if supported
            try {
              const track = stream.getVideoTracks()[0];
              const caps = track.getCapabilities ? track.getCapabilities() : {};
              if (caps.focusMode && caps.focusMode.includes('continuous')) {
                await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                console.log('[CAM] Continuous autofocus enabled');
              }
            } catch(e) { /* autofocus not supported */ }
            const overlay = document.createElement('div');
            overlay.className = 'scan-overlay';
            overlay.innerHTML = '<div class="scan-frame"><div class="scan-line"></div></div>';
            box.appendChild(overlay);
            const hint = document.createElement('div');
            hint.className = 'scan-hint';
            hint.textContent = 'Apunta al QR del acreditado';
            box.appendChild(hint);

            // Debug bar — shows which engine is active
            const debugBar = document.createElement('div');
            debugBar.id = 'qr-debug';
            debugBar.style.cssText = 'position:absolute;top:8px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,0,0.9);font-weight:bold;z-index:10;padding:2px 8px';
            const hasNative = typeof BarcodeDetector !== 'undefined';
            const hasZXing = typeof ZXing !== 'undefined' && ZXing.QRCodeReader;
            debugBar.textContent = hasNative ? '● Native BarcodeDetector' : hasZXing ? '● ZXing' : '● jsQR only';
            box.appendChild(debugBar);

            await vid.play();
            toggle.dataset.scanning = 'true';
            toggle.textContent = 'Detener escáner';
            toggle.className = 'btn btn-ghost';

            // Start scanning loop
            tickScan(vid, persistCanvas);
          }
        } catch(err) {
          console.error('Camera error:', err);
          alert('No se pudo acceder a la cámara: ' + err.message);
        }
      } else {
        stopCamera();
        toggle.dataset.scanning = 'false';
        toggle.textContent = 'Iniciar escáner';
        toggle.className = 'btn btn-blue';
        // Remove the persistent canvas
        if (persistCanvas.parentNode) persistCanvas.parentNode.removeChild(persistCanvas);
        const box = $('cam-box');
        if (box) {
          box.style.cssText = 'background:#111;border-radius:12px;height:170px;display:flex;align-items:center;justify-content:center;margin-bottom:10px';
          box.innerHTML = '<span style="color:rgba(255,255,255,0.3);font-size:13px">Cámara inactiva</span>';
        }
      }
    };

    if (manBtn) manBtn.onclick = () => { const v = manIn?.value?.trim(); if (v) { handleScan(v); manIn.value = ''; } };
    if (manIn)  manIn.onkeydown = e => { if (e.key === 'Enter') { const v = manIn.value.trim(); if (v) { handleScan(v); manIn.value = ''; } } };
  }, 0);

  return wrap;
}

// ZXing reader — initialized once, reused every frame
let _zxingReader = null;
function getZXingReader() {
  if (_zxingReader) return _zxingReader;
  try {
    if (typeof ZXing !== 'undefined') {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      _zxingReader = new ZXing.MultiFormatReader();
      _zxingReader.setHints(hints);
      console.log('[QR] ZXing reader initialized');
    }
  } catch(e) { console.warn('[QR] ZXing init failed:', e.message); }
  return _zxingReader;
}

function tickScan(video, canvas) {
  if (rafId) clearInterval(rafId);

  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const reader = getZXingReader();
  console.log('[QR] Starting scan. Engine:', reader ? 'ZXing' : 'jsQR',
    '| video readyState:', video?.readyState,
    '| dimensions:', video?.videoWidth, 'x', video?.videoHeight);

  rafId = setInterval(() => {
    const liveVideo = document.getElementById('qr-video-live') || video;
    if (!liveVideo || liveVideo.readyState < 2 || liveVideo.videoWidth === 0 || liveVideo.paused) return;

    try {
      const vw = liveVideo.videoWidth;
      const vh = liveVideo.videoHeight;
      canvas.width = vw; canvas.height = vh;
      ctx.drawImage(liveVideo, 0, 0, vw, vh);
      const imageData = ctx.getImageData(0, 0, vw, vh);

      if (reader) {
        // ZXing path — uses HTMLCanvasElementLuminanceSource (native canvas support)
        try {
          const luminance = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
          const binarized = new ZXing.HybridBinarizer(luminance);
          const bitmap    = new ZXing.BinaryBitmap(binarized);
          const result    = reader.decode(bitmap);
          if (result?.getText()?.trim()) {
            const raw = result.getText().trim();
            console.log('[QR] ZXing hit:', raw);
            // Stop scanning immediately to prevent double-scans
            clearInterval(rafId); rafId = null;
            handleScan(raw);
          }
        } catch(e) {
          // NotFoundException thrown every frame when no QR visible — suppress it
          if (!e.message?.includes('NotFoundException') && !e.name?.includes('NotFoundException')) {
            console.warn('[QR] ZXing error:', e.message);
          }
        }
      } else {
        // jsQR fallback
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
        if (code?.data?.trim()) {
          console.log('[QR] jsQR hit:', code.data.trim().substring(0, 50));
          handleScan(code.data.trim());
        }
      }
    } catch (e) {
      console.warn('[QR] Frame error:', e.message);
    }
  }, 200);
}

function stopCamera() {
  if (rafId) { clearInterval(rafId); rafId = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

async function handleScan(raw) {
  if (scanCooldown) return;
  scanCooldown = true;
  await processScan(raw);

  // For duplicate results: show the warning briefly, re-enable scanning quickly
  // so the operator doesn't have to wait the full cooldown to scan the next person
  const isDuplicate = document.querySelector('#result-area .rc.duplicate');
  const cooldownMs = isDuplicate ? 1800 : 2800;

  // Fully reset to inactive state — camera off, overlay gone, button ready
  stopCamera();
  const box = document.getElementById('cam-box');
  if (box) {
    box.style.cssText = 'background:#111;border-radius:12px;height:170px;display:flex;align-items:center;justify-content:center;margin-bottom:10px';
    box.innerHTML = '<span style="color:rgba(255,255,255,0.3);font-size:13px">Cámara inactiva</span>';
  }
  const toggle = document.getElementById('scan-toggle');
  if (toggle) {
    toggle.textContent = 'Iniciar escáner';
    toggle.className = 'btn btn-blue';
  }
  const scanToggle = document.getElementById('scan-toggle');
  if (scanToggle) scanToggle.dataset.scanning = 'false';
  setTimeout(() => {
    scanCooldown = false;
    refreshLog(); // update list without wiping the result card
  }, cooldownMs);
}

function renderPendingCard(parsed, result) {
  const area = $('result-area');
  if (!area) return;
  const room = state.rooms.find(r => r.id === state.activeRoomId);
  const isAdmin = state.profile?.role === 'master_admin' || state.profile?.role === 'admin';

  // Admin sees approve/deny directly (existing behaviour)
  if (isAdmin) {
    area.innerHTML = `
      <div class="rc pending">
        <div class="rh"><div class="ri">?</div><div class="rs">Acreditado no registrado</div></div>
        ${parsed ? `<div class="rname">${parsed.name}</div><div class="rcode">${parsed.code}</div>
          <div class="pills">
            ${parsed.state ? `<span class="pill pill-e">${parsed.state}</span>` : ''}
            ${parsed.sport ? `<span class="pill pill-s">${parsed.sport}</span>` : ''}
            ${(parsed.categories || []).slice(0,2).map(c => `<span class="pill pill-c">${c}</span>`).join('')}
          </div>` : ''}
        <div class="rr">${result.reason}</div>
        <div class="pending-info">Al aprobar, este perfil se agrega al sistema. Todos los siguientes con el mismo deporte, estado y categoría pasarán automáticamente.</div>
        <div class="decision-btns">
          <button class="btn-sm btn-sm-green" onclick="window._decidePending('grant')">✓ Aprobar y agregar</button>
          <button class="btn-sm btn-sm-red" onclick="window._decidePending('deny')">✕ Denegar</button>
        </div>
      </div>`;
    window._decidePending = (action) => decidePending(action);
    return;
  }

  // Operator view — PIN gate
  const hasPin = room?.pin && room.pin.trim() !== '';

  area.innerHTML = `
    <div class="rc pending">
      <div class="rh"><div class="ri">?</div><div class="rs">Acreditado no registrado</div></div>
      ${parsed ? `<div class="rname">${parsed.name}</div><div class="rcode">${parsed.code}</div>
        <div class="pills">
          ${parsed.state ? `<span class="pill pill-e">${parsed.state}</span>` : ''}
          ${parsed.sport ? `<span class="pill pill-s">${parsed.sport}</span>` : ''}
          ${(parsed.categories || []).slice(0,2).map(c => `<span class="pill pill-c">${c}</span>`).join('')}
        </div>` : ''}
      <div class="rr">${result.reason}</div>

      ${!hasPin ? `
        <div class="ibar ibar-r" style="margin-top:10px;margin-bottom:0">
          ⚠️ No hay PIN configurado para este comedor. Un administrador debe establecer un PIN antes de poder aprobar perfiles desconocidos.
        </div>` : `
        <div class="pending-info">Muestra esta pantalla al administrador para que ingrese el PIN del comedor.</div>
        <div style="margin-top:10px">
          <input class="pin-i" id="pending-pin-input" type="password" placeholder="PIN del comedor" style="margin-bottom:6px"/>
          <div id="pending-pin-err" class="ibar ibar-r" style="display:none;margin-bottom:6px;font-size:11px"></div>
          <button class="btn-sm btn-sm-blue" style="width:100%;padding:9px" onclick="window._unlockPending()">Ingresar</button>
        </div>
        <div id="pending-decision-wrap" style="display:none">
          <div class="pending-info" id="pending-timer-msg" style="margin-bottom:8px"></div>
          <div class="decision-btns">
            <button class="btn-sm btn-sm-green" onclick="window._decidePending('grant')">✓ Aprobar y agregar</button>
            <button class="btn-sm btn-sm-red" onclick="window._decidePending('deny')">✕ Denegar</button>
          </div>
        </div>`}
    </div>`;

  if (!hasPin) return;

  // Wire PIN unlock
  let pinTimer = null;

  window._unlockPending = () => {
    const input  = $('pending-pin-input');
    const errEl  = $('pending-pin-err');
    const entered = input?.value || '';
    if (entered !== room.pin) {
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'PIN incorrecto. Intenta de nuevo.'; }
      if (input) input.value = '';
      return;
    }

    // PIN correct — show decision buttons, hide PIN block, start timer
    if (errEl) errEl.style.display = 'none';
    const pinBlock = input?.closest('div[style]');
    if (input) input.closest('div').style.display = 'none';

    const decisionWrap = $('pending-decision-wrap');
    const timerMsg     = $('pending-timer-msg');
    if (decisionWrap) decisionWrap.style.display = 'block';

    let secondsLeft = 30;
    const tick = () => {
      if (timerMsg) timerMsg.textContent = `Acceso de administrador activo — ${secondsLeft}s`;
      if (secondsLeft <= 0) {
        clearInterval(pinTimer);
        // Hide decision buttons and restore PIN input
        if (decisionWrap) decisionWrap.style.display = 'none';
        // Re-render the card from scratch to reset state
        renderPendingCard(parsed, result);
        return;
      }
      secondsLeft--;
    };
    tick();
    pinTimer = setInterval(tick, 1000);
  };

  window._decidePending = (action) => {
    if (pinTimer) clearInterval(pinTimer);
    decidePending(action);
  };

  // Allow Enter key on PIN input
  setTimeout(() => {
    $('pending-pin-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') window._unlockPending();
    });
  }, 0);
}

async function refreshOperatorList(container) {
  container.innerHTML = '<div class="lempty">Cargando…</div>';
  try {
    const snap = await getDocs(usersColRef());
    const operators = snap.docs
      .map(d => ({ uid: d.id, ...d.data() }))
      .filter(u => u.role === 'operator')
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

    if (operators.length === 0) {
      container.innerHTML = '<div class="lempty">No hay operadores registrados aún.</div>';
      return;
    }

    container.innerHTML = '';
    operators.forEach(op => {
      const assignedRoom = state.rooms.find(r => r.id === op.assignedRoom);
      const li = el('div', 'li tappable');
      li.innerHTML = `
        <div class="ld" style="background:var(--amber)"></div>
        <div style="flex:1;min-width:0">
          <div class="ln">${op.name || op.email}</div>
          <div class="lm">${op.email}</div>
        </div>
        <div class="ltime" style="text-align:right">
          <div style="font-size:11px;color:var(--text2)">${assignedRoom ? assignedRoom.name : 'Sin comedor'}</div>
        </div>
        <div class="ledit">›</div>`;
      li.onclick = () => showOperatorModal(op, container);
      container.appendChild(li);
    });
  } catch (e) {
    container.innerHTML = `<div class="lempty" style="color:var(--red-text)">Error al cargar operadores.</div>`;
    console.error('[OPS]', e);
  }
}

// Returns a valid access token, requesting one if needed or expired
function getGoogleToken() {
  return new Promise((resolve, reject) => {
    const now = Date.now();
    if (state.googleToken && now < state.googleTokenExpiry - 60000) {
      resolve(state.googleToken);
      return;
    }
    if (typeof google === 'undefined' || !google.accounts) {
      reject(new Error('Google Identity Services no cargó. Verifica tu conexión.'));
      return;
    }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope:     GOOGLE_SCOPES,
      callback:  (resp) => {
        if (resp.error) { reject(new Error(resp.error)); return; }
        state.googleToken       = resp.access_token;
        state.googleTokenExpiry = Date.now() + (resp.expires_in * 1000);
        resolve(state.googleToken);
      },
    });
    client.requestAccessToken({ prompt: state.googleToken ? '' : 'consent' });
  });
}

// Open Google Drive Picker to select a Google Sheet — resolves {id, name}
function pickGoogleSheet() {
  return new Promise(async (resolve, reject) => {
    try {
      const token = await getGoogleToken();
      // Load Picker API if not already loaded
      await new Promise(res => {
        if (typeof gapi !== 'undefined' && gapi.picker) { res(); return; }
        gapi.load('picker', res);
      });
      const view = new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS)
        .setIncludeFolders(false)
        .setSelectFolderEnabled(false);
      const picker = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(token)
        .setTitle('Selecciona la hoja de Google Sheets del evento')
        .setCallback((data) => {
          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            resolve({ id: doc.id, name: doc.name });
          } else if (data.action === google.picker.Action.CANCEL) {
            reject(new Error('cancelled'));
          }
        })
        .build();
      picker.setVisible(true);
    } catch(e) { reject(e); }
  });
}

// Open Google Drive Picker to select any Excel/CSV file — resolves {id, name, mimeType}
function pickDriveFile() {
  return new Promise(async (resolve, reject) => {
    try {
      const token = await getGoogleToken();
      await new Promise(res => {
        if (typeof gapi !== 'undefined' && gapi.picker) { res(); return; }
        gapi.load('picker', res);
      });
      const view = new google.picker.DocsView()
        .setIncludeFolders(false)
        .setMimeTypes('application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/vnd.google-apps.spreadsheet');
      const picker = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(token)
        .setTitle('Selecciona el archivo de credenciales')
        .setCallback((data) => {
          if (data.action === google.picker.Action.PICKED) {
            const doc = data.docs[0];
            resolve({ id: doc.id, name: doc.name, mimeType: doc.mimeType });
          } else if (data.action === google.picker.Action.CANCEL) {
            reject(new Error('cancelled'));
          }
        })
        .build();
      picker.setVisible(true);
    } catch(e) { reject(e); }
  });
}

// Download a file from Drive by ID — for xlsx/csv credential imports
async function downloadDriveFile(fileId, mimeType) {
  const token = await getGoogleToken();
  // If it's a Google Sheet, export as xlsx; otherwise download directly
  const isGSheet = mimeType === 'application/vnd.google-apps.spreadsheet';
  const url = isGSheet
    ? `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`
    : `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
  const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!resp.ok) throw new Error(`Drive download failed: ${resp.status}`);
  return await resp.arrayBuffer();
}

// Ensure a tab with the given name exists in the Sheet — creates it if missing
// Returns the sheet (tab) ID
async function ensureSheetTab(sheetId, tabName, token) {
  // Get spreadsheet metadata
  const metaResp = await fetch(`${SHEETS_API}/${sheetId}?fields=sheets.properties`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!metaResp.ok) throw new Error(`Sheets metadata failed: ${metaResp.status}`);
  const meta = await metaResp.json();
  const existing = (meta.sheets || []).find(s => s.properties.title === tabName);
  if (existing) return existing.properties.sheetId;

  // Create new tab
  const addResp = await fetch(`${SHEETS_API}/${sheetId}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: [{ addSheet: { properties: { title: tabName } } }] })
  });
  if (!addResp.ok) throw new Error(`Failed to create tab: ${addResp.status}`);
  const addData = await addResp.json();
  const newSheetId = addData.replies[0].addSheet.properties.sheetId;

  // Write header row
  const headers = [['Fecha','Turno','Hora','Fecha_Hora','Resultado','Codigo','Nombre','Estado','Deporte','Categorias','Comedor','Lat','Lng']];
  await fetch(`${SHEETS_API}/${sheetId}/values/${encodeURIComponent(tabName + '!A1')}:append?valueInputOption=RAW`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: headers })
  });
  return newSheetId;
}

// Export unexported scans for one room to its tab in the master Sheet
async function exportRoomToSheet(roomId, statusCallback) {
  const room = state.rooms.find(r => r.id === roomId);
  if (!room) throw new Error('Comedor no encontrado');

  // Load sheetId from event doc
  const eventSnap = await getDoc(eventDocRef());
  const sheetId   = eventSnap.data()?.sheetId;
  const sheetName = eventSnap.data()?.sheetName;
  if (!sheetId) throw new Error('No hay hoja de Google Sheets configurada. Selecciona una primero.');

  statusCallback?.('Conectando con Google…');
  const token = await getGoogleToken();

  statusCallback?.('Verificando pestaña del comedor…');
  const tabName = room.name;
  await ensureSheetTab(sheetId, tabName, token);

  statusCallback?.('Buscando registros nuevos…');
  // Fetch all scans and filter in memory — Firestore != operator excludes docs
  // where the field doesn't exist, which would miss all pre-feature scan docs
  const snap = await db.collection('forza_eventos').doc('current_event')
    .collection('rooms').doc(roomId)
    .collection('scans')
    .get();

  const allDocs = snap.docs.filter(d => {
    const data = d.data();
    return data.type === 'scan' && data.exportedToSheet !== true;
  });
  const scans = allDocs.map(d => ({ _id: d.id, ...d.data() }));

  if (scans.length === 0) {
    statusCallback?.('✓ Sin registros nuevos para exportar.');
    return 0;
  }

  statusCallback?.(`Exportando ${scans.length} registros…`);
  const rows = scans.map(s => [
    s.day || '', s.shiftName || '', s.time || '',
    (s.day && s.time ? `${s.day} ${s.time}` : ''),
    s.result?.result || '', s.parsed?.code || '', s.parsed?.name || '',
    s.parsed?.state || '', s.parsed?.sport || '',
    (s.parsed?.categories || []).join(' | '),
    room.name, s.geo?.lat || '', s.geo?.lng || ''
  ]);

  const appendResp = await fetch(
    `${SHEETS_API}/${sheetId}/values/${encodeURIComponent(tabName + '!A1')}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
    {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: rows })
    }
  );
  if (!appendResp.ok) {
    const err = await appendResp.json();
    throw new Error(`Sheets append failed: ${err.error?.message || appendResp.status}`);
  }

  statusCallback?.('Marcando registros como exportados…');
  // Batch-write exportedToSheet: true — Firestore batch max is 500
  const batchSize = 400;
  for (let i = 0; i < allDocs.length; i += batchSize) {
    const batch = db.batch();
    allDocs.slice(i, i + batchSize).forEach(d => batch.update(d.ref, { exportedToSheet: true }));
    await batch.commit();
  }

  statusCallback?.(`✓ ${scans.length} registros exportados a "${sheetName}".`);
  return scans.length;
}

        showMsg('Procesando…');
        // Reuse the same merge logic as the manual file upload
        const wb   = XLSX.read(new Uint8Array(buf), { type: 'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        const tree = {};
        rows.slice(1).forEach(row => {
          if (!row[1]) return;
          const cell = String(row[1]);
          if (!cell.includes('\n')) return;
          const parts = cell.split('\n').map(s => s.trim()).filter(Boolean);
          if (parts.length < 4) return;
          const sport = parts[3], state2 = parts[2];
          const cats = parts.slice(4).filter(Boolean);
          if (!tree[sport]) tree[sport] = {};
          if (!tree[sport][state2]) tree[sport][state2] = new Set();
          cats.forEach(c => tree[sport][state2].add(c));
        });
        const newAcc = JSON.parse(JSON.stringify(room.access || {}));
        Object.entries(tree).forEach(([sp, states]) => {
          if (!newAcc[sp]) newAcc[sp] = { enabled: true, states: {} };
          Object.entries(states).forEach(([st, cats]) => {
            if (!newAcc[sp].states[st]) newAcc[sp].states[st] = { enabled: true, cats: {} };
            cats.forEach(c => { if (!newAcc[sp].states[st].cats[c]) newAcc[sp].states[st].cats[c] = { enabled: true }; });
          });
        });
        await db.collection('forza_eventos').doc('current_event').collection('rooms').doc(room.id).update({ access: newAcc });
        showMsg(`✓ "${name}" importado y fusionado desde Drive.`, 'g');
      } catch(e) {
        if (e.message !== 'cancelled') showMsg(`Error: ${e.message}`, 'r');
        else if (msgEl) msgEl.textContent = '';
      } finally {
        btn.disabled = false;
      }
    });
    fileInput.onchange = async e => {
      const file = e.target.files[0]; if (!file) return;
      upMsg.textContent = 'Procesando…'; upMsg.className = 'ibar ibar-b';
      try {
        const buf = await file.arrayBuffer();
        // parseMergeXLSX is defined in the old code — reuse it inline:
        const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        const tree = {};
        rows.slice(1).forEach(row => {
          if (!row[1]) return;
          const cell = String(row[1]);
          if (!cell.includes('\n')) return;
          const parts = cell.split('\n').map(s => s.trim()).filter(Boolean);
          if (parts.length < 4) return;
          const sport = parts[3], state2 = parts[2];
          const cats = parts.slice(4).filter(Boolean);
          if (!tree[sport]) tree[sport] = {};
          if (!tree[sport][state2]) tree[sport][state2] = new Set();
          cats.forEach(c => tree[sport][state2].add(c));
        });
        const newAcc = JSON.parse(JSON.stringify(room.access || {}));
        Object.entries(tree).forEach(([sp, states]) => {
          if (!newAcc[sp]) newAcc[sp] = { enabled: true, states: {} };
          Object.entries(states).forEach(([st, cats]) => {
            if (!newAcc[sp].states[st]) newAcc[sp].states[st] = { enabled: true, cats: {} };
            cats.forEach(c => { if (!newAcc[sp].states[st].cats[c]) newAcc[sp].states[st].cats[c] = { enabled: true }; });
          });
        });
        await db.collection('forza_eventos').doc('current_event').collection('rooms').doc(room.id).update({ access: newAcc });
        upMsg.textContent = `✓ "${file.name}" importado y fusionado.`;
        upMsg.className = 'ibar ibar-g';
      } catch { upMsg.textContent = 'Error al procesar el archivo.'; upMsg.className = 'ibar ibar-r'; }
    };
    $('add-sport-btn')?.addEventListener('click', async () => {
      const v = $('new-sport-input')?.value.trim(); if (!v) return;
      const newAcc = { ...(room.access || {}), [v]: { enabled: true, states: {} } };
      await db.collection('forza_eventos').doc('current_event').collection('rooms').doc(room.id).update({ access: newAcc });
    });
  }, 0);

  return wrap;
}

function buildToggle(checked, onChange, size = 'md') {
  const label = el('label', size === 'sm' ? 'sw-sm' : 'sw');
  const input = document.createElement('input');
  input.type = 'checkbox'; input.checked = checked;
  input.onchange = e => { e.stopPropagation(); onChange(input.checked); };
  const span = el('span', size === 'sm' ? 'swss' : 'sws');
  label.onclick = e => e.stopPropagation();
  label.appendChild(input); label.appendChild(span);
  return label;
}
