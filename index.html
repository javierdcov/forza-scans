async function loadAdminList(container) {
  try {
    const snap = await getDocs(usersColRef());
    const admins = snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.role === 'admin' || u.role === 'master_admin');
    if (admins.length === 0) { container.innerHTML = '<div class="lempty">No hay admins registrados aún.</div>'; return; }
    container.innerHTML = '<div class="sl" style="margin-top:12px">ADMINS EXISTENTES</div>';
    admins.forEach(u => {

      row.innerHTML = `

async function createAdminAccount() {
  const email = $('new-admin-email')?.value.trim();
  const pass  = $('new-admin-pass')?.value.trim();
  const name  = $('new-admin-name')?.value.trim();
  const msg   = $('admin-msg');
  if (!email || !pass) { if (msg) { msg.className = 'ibar ibar-r'; msg.textContent = 'Email y contraseña requeridos.'; } return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await setDoc(userDocRef(cred.user.uid), { email, name: name || email, role: 'admin', createdAt: serverTimestamp() });
    // Sign back in as master admin — user stays logged in because createUser auto-signs in
    // We store the new user profile but we need to re-auth as ourselves
    if (msg) { msg.className = 'ibar ibar-g'; msg.textContent = `✓ Cuenta creada para ${email}. Pide al admin que cambie su contraseña al primer inicio.`; }
  } catch (e) {
    if (msg) { msg.className = 'ibar ibar-r'; msg.textContent = e.message; }
  }
}

    if (errEl) errEl.style.display = 'none';
    if (!first || !last || !email) {
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Completa todos los campos.'; }
      return;
    }
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, OPERATOR_PASSWORD);
      await db.collection('forza_users').doc(cred.user.uid).set({
        email,
        name:         `${first} ${last}`,
        firstName:    first,
        lastName:     last,
        role:         'operator',
        assignedRoom: null,
        createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
      });
      // onAuthStateChanged fires → startApp() called automatically
    } catch (e) {
      if (errEl) {
        errEl.style.display = 'block';
        errEl.textContent = e.code === 'auth/email-already-in-use'
          ? 'Este correo ya está registrado. Usa "Soy operador" para entrar.'
          : e.message;
      }
    }
  };
  $('enroll-btn')?.addEventListener('click', doEnroll);
  $('enroll-email')?.addEventListener('keydown', e => e.key === 'Enter' && doEnroll());
}

// ── First setup (master admin profile creation) ───────────────
function renderFirstSetup() {
  const root = $('root');
  if (!root) return;
  root.innerHTML = `
    <div class="startup">
      <div class="startup-brand">Forza Scans</div>
      <div class="startup-title">Configuración inicial</div>
      <div class="startup-sub">Primera vez que inicias sesión. Completa tu perfil de administrador maestro.</div>
      <label class="form-label" style="align-self:flex-start;margin-top:8px">Tu nombre</label>
      <input class="minput" id="setup-name" placeholder="Nombre completo" style="width:100%;margin-bottom:16px"/>
      <div id="setup-err" class="ibar ibar-r" style="display:none;margin-bottom:10px"></div>
      <button class="startup-go" id="setup-btn">Completar configuración</button>
    </div>`;
  $('setup-btn')?.addEventListener('click', async () => {
    const name = $('setup-name')?.value.trim();
    if (!name) return;
    try {
      await db.collection('forza_users').doc(state.authUser.uid).set({
        email: state.authUser.email, name, role: 'master_admin', createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      // Create default event + first room
      await db.collection('forza_eventos').doc('current_event').set({ name: 'Olimpiada Nacional 2026', createdAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      await db.collection('forza_eventos').doc('current_event').collection('rooms').doc().set({ name: 'Comedor Principal', access: buildSeedAccess(), pin: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      state.profile = { role: 'master_admin', name };
      startApp();
    } catch (e) {
      const errEl = $('setup-err');
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = e.message; }
    }
  });
}

// ── Auto-close shift ─────────────────────────────────────────
// Parses "HH:MM" into today's Date object, optionally offset by minutes
function shiftTimeToDate(hhmm, day, offsetMinutes = 0) {
  if (!hhmm || !day) return null;
  const [h, m] = hhmm.split(':').map(Number);
  const [y, mo, d] = day.split('-').map(Number);
  const dt = new Date(y, mo - 1, d, h, m, 0, 0);
  dt.setMinutes(dt.getMinutes() + offsetMinutes);
  return dt;
}

async function autoCloseShiftIfNeeded() {
  if (!state.activeRoomId || state.rooms.length === 0) return;
  const openShift = state.shifts.find(s => s.status === 'open');
  if (!openShift) return;

  const now = new Date();
  const nowDay = today(); // local date string

  // Trigger 1: day has changed since the shift was opened
  const dayChanged = openShift.day && openShift.day !== nowDay;

  // Trigger 2: current time is >= end time + 60 minutes
  const autoCloseTime = shiftTimeToDate(openShift.end, openShift.day, 60);
  const pastAutoClose = autoCloseTime && now >= autoCloseTime;

  if (!dayChanged && !pastAutoClose) return;

  const reason = dayChanged ? 'Cierre automático — cambio de día' : 'Cierre automático — 1 hora después del fin de turno';
  console.log(`[SHIFT] ${reason}:`, openShift.name);

  try {
    await updateDoc(shiftDocRef(state.activeRoomId, openShift.id), {
      status:           'closed',
      closedAt:         timeNow(),
      autoClosedReason: reason,
      location:         state.geo || null,
    });
  } catch(e) {
    console.warn('[SHIFT] Auto-close failed:', e.message);
  }
}

let autoCloseTimer = null;

function startAutoCloseTimer() {
  if (autoCloseTimer) clearInterval(autoCloseTimer);
  // Check immediately on start, then every 60 seconds
  autoCloseShiftIfNeeded();
  autoCloseTimer = setInterval(autoCloseShiftIfNeeded, 60 * 1000);
}

function stopAutoCloseTimer() {
  if (autoCloseTimer) { clearInterval(autoCloseTimer); autoCloseTimer = null; }
}

// ── Startup mode selector ─────────────────────────────────────
function startApp() {
  geo(); // get location
  const role = state.profile?.role;
  const isAdmin = role === 'master_admin' || role === 'admin';

  // Assign initial room
  state.activeRoomId = state.profile?.assignedRoom || null;

  // Start real-time listeners (room resolved once rooms load)
  startListeners(state.activeRoomId || '_placeholder');

  // Determine view mode
  state.view = 'scanner';
  state.appMode = isAdmin ? 'admin' : 'operator';

  startAutoCloseTimer();
  rerender();
}
